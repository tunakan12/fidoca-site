<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>フィドカ ― 給油・燃費・整備記録</title>
<meta name="description" content="フィドカは、給油・実燃費・整備記録をかんたんに残せる、日本のカーオーナーのためのクルマ管理アプリです。">
<link rel="icon" type="image/png" href="./fidoca-icon.png">
<link rel="apple-touch-icon" href="./fidoca-icon.png">
<style>
  :root {
    --bg: #F6F7F9;
    --surface: #FFFFFF;
    --text: #20242A;
    --muted: #7A828E;
    --border: #E2E6EA;
    --primary: #176B5D;
    --primary-soft: #DDEFEA;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    line-height: 1.9;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 20px;
    text-align: center;
  }
  .logo {
    display: block;
    width: 88px;
    height: 88px;
    border-radius: 22px;
    object-fit: cover;
    margin: 0 auto 20px;
  }
  h1 { font-size: 32px; margin: 0 0 4px; letter-spacing: 0.04em; }
  .tagline { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .download {
    margin-bottom: 36px;
    padding: 24px;
    border: 1px solid #CFE5DF;
    border-radius: 16px;
    background: linear-gradient(145deg, #FFFFFF 0%, #EAF6F2 100%);
  }
  .download h2 {
    margin: 10px 0 4px;
    font-size: 20px;
    line-height: 1.5;
  }
  .download p {
    margin: 0 0 16px;
    color: var(--muted);
    font-size: 13px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
    text-align: left;
  }
  .card h2 { font-size: 16px; margin: 0 0 12px; color: var(--primary); }
  .card ul { margin: 0; padding-left: 22px; font-size: 15px; }
  .badge {
    display: inline-block;
    background: var(--primary-soft);
    color: var(--primary);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 600;
  }
  .app-store-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 52px;
    padding: 10px 20px;
    border-radius: 12px;
    background: #111315;
    color: #FFFFFF;
    text-decoration: none;
    font-weight: 700;
    box-shadow: 0 8px 20px rgba(17, 19, 21, 0.16);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .app-store-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 11px 24px rgba(17, 19, 21, 0.22);
  }
  .app-store-link:focus-visible {
    outline: 3px solid rgba(23, 107, 93, 0.3);
    outline-offset: 3px;
  }
  .app-store-link svg {
    width: 20px;
    height: 20px;
    flex: none;
  }
  @media (max-width: 480px) {
    .wrap { padding: 40px 16px; }
    .download { padding: 22px 16px; }
    .app-store-link { display: flex; width: 100%; }
  }
  .links { margin-top: 36px; font-size: 14px; }
  .links a { color: var(--primary); }
  footer { margin-top: 48px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="./fidoca-icon.png" alt="フィドカのアプリアイコン" width="88" height="88">
  <h1>フィドカ</h1>
  <p class="tagline">給油・燃費・整備記録 ― 愛車の記録をかんたんに</p>
  <section class="download" aria-labelledby="download-title">
    <span class="badge">App Storeで無料配信中</span>
    <h2 id="download-title">フィドカをiPhoneに</h2>
    <p>登録不要ですぐに使えます。iOS 15.1以降に対応。</p>
    <a class="app-store-link" href="https://apps.apple.com/jp/app/%E3%83%95%E3%82%A3%E3%83%89%E3%82%AB/id6781597740" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M8 5h11v11M19 5 7 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M17 13v6H5V7h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      App Storeで見る
    </a>
  </section>
  <div class="card">
    <h2>フィドカでできること</h2>
    <ul>
      <li>30秒で終わる給油記録と、満タン法による実燃費の自動計算</li>
      <li>オイル交換などの整備記録と、次回時期のリマインド</li>
      <li>燃費の推移グラフで愛車の調子をひと目で把握</li>
    </ul>
  </div>
  <p class="links"><a href="./privacy.html">プライバシーポリシー</a></p>
  <footer>© 2026 フィドカ ― fido(イタリア語で「忠実な」)+ car</footer>
</div>
</body>
</html>
